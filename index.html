<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>bergpunkt - ECT Visualizer</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --muted-light: #cbd5e1;
      --red: #ef4444;
      --yellow: #facc15;
      --amber: #f59e0b;
      --green: #10b981;
      --shadow: 0 1px 3px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      min-height: 100vh;
      padding: 12px;
    }

    .header, .main {
      max-width: 1100px;
      margin: 0 auto;
    }

    .header {
      margin-bottom: 14px;
      padding: 0 6px;
    }

    .header h1 {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 800;
      color: #1e293b;
    }

    .header p {
      margin: 2px 0 0;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #94a3b8;
      font-weight: 700;
    }

    .main {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 12px;
      align-items: start;
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
    }

    .section-head h2 {
      margin: 0;
      font-size: 0.82rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .thumb-wrap {
      width: 88px;
      height: 88px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8fafc;
      border: 1px solid #f1f5f9;
      border-radius: 999px;
      box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.04);
    }

    .thumb-icon {
      width: 48px;
      height: 48px;
      transition: transform 0.35s ease, color 0.35s ease;
      transform-origin: center center;
      color: #cbd5e1;
    }

    .slider-area {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .slider-shell {
      position: relative;
      height: 28px;
      display: flex;
      align-items: center;
    }

    .slider-track {
      position: absolute;
      inset: 50% 0 auto 0;
      transform: translateY(-50%);
      height: 10px;
      display: flex;
      overflow: hidden;
      border-radius: 999px;
      opacity: 0.28;
    }

    .slider-track .seg-red { width: 37.1%; background: var(--red); }
    .slider-track .seg-yellow { width: 35.5%; background: var(--yellow); }
    .slider-track .seg-green { width: 27.4%; background: var(--green); }

    input[type="range"] {
      position: relative;
      z-index: 1;
      width: 100%;
      appearance: none;
      background: transparent;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 10px;
      background: transparent;
    }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #0f172a;
      border: 2px solid white;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.18);
      margin-top: -5px;
    }

    input[type="range"]::-moz-range-track {
      height: 10px;
      background: transparent;
      border: none;
    }

    input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #0f172a;
      border: 2px solid white;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.18);
    }

    .tap-display {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    .tap-display .value {
      font-size: 3rem;
      font-weight: 900;
      line-height: 1;
    }

    .tap-display .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      font-weight: 800;
      color: #94a3b8;
      letter-spacing: 0.06em;
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 12px;
    }

    .choice-btn {
      border: 2px solid #f1f5f9;
      background: #f8fafc;
      color: #94a3b8;
      border-radius: 16px;
      padding: 14px 10px;
      font-weight: 900;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.22s ease;
    }

    .choice-btn:hover { transform: translateY(-1px); }
    .choice-btn.active-red { border-color: var(--red); background: #fef2f2; color: #b91c1c; }
    .choice-btn.active-yellow { border-color: #eab308; background: #fefce8; color: #a16207; }
    .choice-btn.active-green { border-color: var(--green); background: #ecfdf5; color: #047857; }

    .propagation-text {
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 800;
      text-align: center;
    }

    .prop-red { color: #dc2626; }
    .prop-yellow { color: #ca8a04; }
    .prop-green { color: #059669; }
    .placeholder { color: #cbd5e1; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; }

    .result-card {
      min-height: 330px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }

    .result-title {
      margin: 0 0 22px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.35em;
      color: #94a3b8;
      font-weight: 900;
    }

    .gauge-wrap {
      position: relative;
      width: 220px;
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
    }

    .gauge-svg {
      position: absolute;
      width: 200px;
      height: 200px;
    }

    .result-thumb {
      position: absolute;
      width: 72px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.45s cubic-bezier(.2,.8,.2,1);
      transform-origin: center center;
    }

    .result-thumb-inner {
      width: 62px;
      height: 62px;
      border-radius: 999px;
      background: white;
      border: 1px solid #f1f5f9;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .result-label {
      margin: 0 0 6px;
      font-size: 2rem;
      font-weight: 900;
    }

    .result-description {
      margin: 0;
      max-width: 220px;
      color: #94a3b8;
      font-size: 11px;
      line-height: 1.35;
      font-weight: 600;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #cbd5e1;
      padding: 34px 0;
    }

    .warning-icon {
      width: 52px;
      height: 52px;
      opacity: 0.25;
      margin-bottom: 14px;
    }

    .empty-state p {
      margin: 0;
      font-size: 0.9rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.14em;
    }

    .text-green { color: #047857; }
    .text-yellow { color: #a16207; }
    .text-orange { color: #c2410c; }
    .text-red { color: #b91c1c; }
    .text-soft { color: #cbd5e1; }

    .fade { animation: fadeIn 0.25s ease; }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.97); }
      to { opacity: 1; transform: scale(1); }
    }

    @media (max-width: 900px) {
      .main { grid-template-columns: 1fr; }
    }

    @media (max-width: 560px) {
      .page { padding: 10px; }
      .card { padding: 14px; }
      .thumb-wrap { width: 76px; height: 76px; }
      .button-grid { grid-template-columns: 1fr; }
      .tap-display .value { font-size: 2.4rem; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <h1>bergpunkt - ECT Visualizer</h1>
      <p>Extended Column Test</p>
    </header>

    <main class="main">
      <div class="stack">
        <section class="card">
          <div class="section-head">
            <h2>Bruchinitiierung</h2>
            <div class="thumb-wrap">
              <svg id="initiationThumb" class="thumb-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M2 21h4V9H2v12Zm20-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L13 1 6.59 7.41C6.22 7.78 6 8.3 6 8.83V19c0 1.1.9 2 2 2h9c.82 0 1.52-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2Z"/>
              </svg>
            </div>
          </div>

          <div class="slider-area">
            <div class="slider-shell">
              <div class="slider-track">
                <div class="seg-red"></div>
                <div class="seg-yellow"></div>
                <div class="seg-green"></div>
              </div>
              <input id="taps" type="range" min="0" max="31" value="0" />
            </div>
            <div class="tap-display">
              <span id="tapValue" class="value">--</span>
              <span class="label">Schläge</span>
            </div>
          </div>
        </section>

        <section class="card">
          <div class="section-head">
            <h2>Bruchfortpflanzung</h2>
            <div class="thumb-wrap">
              <svg id="propagationThumb" class="thumb-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M2 21h4V9H2v12Zm20-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L13 1 6.59 7.41C6.22 7.78 6 8.3 6 8.83V19c0 1.1.9 2 2 2h9c.82 0 1.52-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2Z"/>
              </svg>
            </div>
          </div>

          <div class="button-grid">
            <button class="choice-btn" data-propagation="glatt">ECTP</button>
            <button class="choice-btn" data-propagation="partiell">ECTpp</button>
            <button class="choice-btn" data-propagation="nicht">ECTN</button>
          </div>

          <div id="propagationText" class="propagation-text placeholder">Bitte wählen</div>
        </section>
      </div>

      <div class="stack">
        <section class="card result-card">
          <h2 class="result-title">Resultat</h2>
          <div id="resultContent"></div>
        </section>
      </div>
    </main>
  </div>

  <script>
    const tapsInput = document.getElementById('taps');
    const tapValue = document.getElementById('tapValue');
    const initiationThumb = document.getElementById('initiationThumb');
    const propagationThumb = document.getElementById('propagationThumb');
    const propagationText = document.getElementById('propagationText');
    const propagationButtons = document.querySelectorAll('[data-propagation]');
    const resultContent = document.getElementById('resultContent');

    let taps = null;
    let propagation = null;

    function getInitiationValue(value) {
      if (value === null) return null;
      if (value <= 11) return -1;
      if (value <= 22) return 0;
      return 1;
    }

    function getInitiationRotation(value) {
      if (value === -1) return 180;
      if (value === 0) return 90;
      return 0;
    }

    function getInitiationColor(raw) {
      if (raw === null) return '#cbd5e1';
      if (raw <= 11) return '#ef4444';
      if (raw <= 22) return '#eab308';
      return '#10b981';
    }

    function getPropagationValue(value) {
      if (value === null) return null;
      if (value === 'glatt') return -1;
      if (value === 'partiell') return 0;
      return 1;
    }

    function getPropagationRotation(value) {
      if (value === -1) return 180;
      if (value === 0) return 90;
      return 0;
    }

    function getPropagationColor(value) {
      if (value === 'glatt') return '#ef4444';
      if (value === 'partiell') return '#eab308';
      if (value === 'nicht') return '#10b981';
      return '#cbd5e1';
    }

    function getStabilityInfo(totalScore) {
      if (totalScore === null) return null;
      if (totalScore >= 1) {
        return {
          label: 'Gut',
          textClass: 'text-green',
          rotation: 22.5,
          description: 'Gute Stabilität. Bruchinitiierung ist schwierig oder Fortpflanzung unwahrscheinlich.'
        };
      }
      if (totalScore === 0) {
        return {
          label: 'Mittel',
          textClass: 'text-yellow',
          rotation: 67.5,
          description: 'Mittlere Stabilität. Vorsicht geboten.'
        };
      }
      if (totalScore === -1) {
        return {
          label: 'Schlecht',
          textClass: 'text-orange',
          rotation: 112.5,
          description: 'Schlechte Stabilität. Brüche initiieren leicht und pflanzen sich fort.'
        };
      }
      return {
        label: 'Sehr Schlecht',
        textClass: 'text-red',
        rotation: 157.5,
        description: 'Sehr schlechte Stabilität. Hohe Lawinengefahr!'
      };
    }

    function renderResult(stabilityInfo, totalScore) {
      if (!stabilityInfo) {
        resultContent.innerHTML = `
          <div class="empty-state fade">
            <svg class="warning-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M1 21h22L12 2 1 21Zm12-3h-2v-2h2v2Zm0-4h-2v-4h2v4Z"></path>
            </svg>
            <p>Werte eingeben</p>
          </div>
        `;
        return;
      }

      resultContent.innerHTML = `
        <div class="fade">
          <div class="gauge-wrap">
            <svg class="gauge-svg" width="200" height="200" viewBox="0 0 200 200">
              <path d="M 100 100 L 100 10 A 90 90 0 0 1 163.6 36.4 Z" fill="#00FF00" opacity="${totalScore >= 1 ? 1 : 0.1}" />
              <text x="125" y="45" fill="#064e3b" font-size="11" font-weight="900" transform="rotate(-30, 125, 45)">GUT</text>

              <path d="M 100 100 L 163.6 36.4 A 90 90 0 0 1 190 100 Z" fill="#FFFF00" opacity="${totalScore === 0 ? 1 : 0.1}" />
              <text x="160" y="80" fill="#78350f" font-size="11" font-weight="900" transform="rotate(15, 160, 80)">MITTEL</text>

              <path d="M 100 100 L 190 100 A 90 90 0 0 1 163.6 163.6 Z" fill="#FF8000" opacity="${totalScore === -1 ? 1 : 0.1}" />
              <text x="155" y="130" fill="#7c2d12" font-size="11" font-weight="900" transform="rotate(60, 155, 130)">SCHLECHT</text>

              <path d="M 100 100 L 163.6 163.6 A 90 90 0 0 1 100 190 Z" fill="#FF0000" opacity="${totalScore <= -2 ? 1 : 0.1}" />
              <text x="115" y="165" fill="#7f1d1d" font-size="10" font-weight="900" transform="rotate(100, 115, 165)">SEHR SCHLECHT</text>

              <circle cx="100" cy="100" r="38" fill="white" stroke="#f1f5f9" stroke-width="1" />
            </svg>

            <div class="result-thumb" style="transform: rotate(${stabilityInfo.rotation}deg);">
              <div class="result-thumb-inner">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                  <path d="M2 21h4V9H2v12Zm20-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L13 1 6.59 7.41C6.22 7.78 6 8.3 6 8.83V19c0 1.1.9 2 2 2h9c.82 0 1.52-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2Z"/>
                </svg>
              </div>
            </div>
          </div>

          <h3 class="result-label ${stabilityInfo.textClass}">${stabilityInfo.label}</h3>
          <p class="result-description">${stabilityInfo.description}</p>
        </div>
      `;
    }

    function updateUI() {
      const initiationValue = getInitiationValue(taps);
      const initiationRotation = getInitiationRotation(initiationValue);
      const initiationColor = getInitiationColor(taps);

      initiationThumb.style.transform = `rotate(${initiationRotation}deg)`;
      initiationThumb.style.color = initiationColor;
      tapValue.textContent = taps === null ? '--' : taps;

      const propagationValue = getPropagationValue(propagation);
      const propagationRotation = getPropagationRotation(propagationValue);
      const propagationColor = getPropagationColor(propagation);

      propagationThumb.style.transform = `rotate(${propagationRotation}deg)`;
      propagationThumb.style.color = propagationColor;

      propagationButtons.forEach((btn) => {
        btn.className = 'choice-btn';
        if (btn.dataset.propagation === propagation) {
          if (propagation === 'glatt') btn.classList.add('active-red');
          if (propagation === 'partiell') btn.classList.add('active-yellow');
          if (propagation === 'nicht') btn.classList.add('active-green');
        }
      });

      if (propagation === 'glatt') {
        propagationText.className = 'propagation-text prop-red';
        propagationText.textContent = 'Glatte Bruchfläche';
      } else if (propagation === 'partiell') {
        propagationText.className = 'propagation-text prop-yellow';
        propagationText.textContent = 'Raue Bruchfläche';
      } else if (propagation === 'nicht') {
        propagationText.className = 'propagation-text prop-green';
        propagationText.textContent = 'Keine Bruchfortpflanzung';
      } else {
        propagationText.className = 'propagation-text placeholder';
        propagationText.textContent = 'Bitte wählen';
      }

      const totalScore = initiationValue === null || propagationValue === null ? null : initiationValue + propagationValue;
      const stabilityInfo = getStabilityInfo(totalScore);
      renderResult(stabilityInfo, totalScore);
    }

    tapsInput.addEventListener('input', (e) => {
      taps = Number(e.target.value);
      updateUI();
    });

    propagationButtons.forEach((btn) => {
      btn.addEventListener('click', () => {
        propagation = btn.dataset.propagation;
        updateUI();
      });
    });

    updateUI();
  </script>
</body>
</html>
